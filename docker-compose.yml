services:

  postgres:
    image: postgres:15
    container_name: cloudcommerce-db
    environment:
      POSTGRES_DB: cloudcommerce
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data  
    networks:
      - cloudnet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d cloudcommerce"]
      interval: 5s
      timeout: 5s
      retries: 10

  nginx:
    image: nginx:latest
    container_name: api-gateway
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - user-service
      - product-service
      - order-service
      - payment-service
    networks:
      - cloudnet

  redis:
    image: redis:7
    container_name: cloudcommerce-redis
    ports:
      - "6379:6379"
    networks:
      - cloudnet

  user-service:
    build: ./user-service
    container_name: user-service
    ports:
      - "5001:5001"
    environment:
      DB_HOST: postgres
      DB_NAME: cloudcommerce
      DB_USER: admin
      DB_PASSWORD: secret
      SECRET_KEY: supersecretkey
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - cloudnet
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  product-service:
    build: ./product-service
    container_name: product-service
    ports:
      - "5002:5002"
    environment:
      DB_HOST: postgres
      DB_NAME: cloudcommerce
      DB_USER: admin
      DB_PASSWORD: secret
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - cloudnet
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5002/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  order-service:
    build: ./order-service
    container_name: order-service
    ports:
      - "5003:5003"
    environment:
      DB_HOST: postgres
      DB_NAME: cloudcommerce
      DB_USER: admin
      DB_PASSWORD: secret
      SECRET_KEY: supersecretkey
      USER_SERVICE_URL: http://user-service:5001
      PRODUCT_SERVICE_URL: http://product-service:5002
    depends_on:
      postgres:
        condition: service_healthy
      user-service:
        condition: service_started
      product-service:
        condition: service_started
    networks:
      - cloudnet
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5003/health"]
      interval: 10s
      timeout: 5s
      retries: 5
  
  payment-service:
    build: ./payment-service
    container_name: payment-service
    ports:
      - "5004:5004"
    networks:
      - cloudnet
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5004/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    image: nginx:latest
    container_name: frontend
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
    networks:
      - cloudnet
      
networks:
  cloudnet:
    driver: bridge

volumes:
  postgres_data:
    driver: local